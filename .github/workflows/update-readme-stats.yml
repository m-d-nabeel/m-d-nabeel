name: Update README stats cards

on:
  schedule:
    # Runs at midnight UTC every day.
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the repository using the default bot token
      - uses: actions/checkout@v4

      # Step 2: Generate the stats card using your PAT to fetch private data
      - name: Generate Top Languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # Your exact customization options
          options: username=m-d-nabeel&layout=compact&hide=jupyter%20notebook,html&theme=tokyonight
          # This is where the SVG will be saved in your repo
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      # Step 3: Commit and push the generated SVG back to the repository using the default bot
      - name: Commit generated cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push
